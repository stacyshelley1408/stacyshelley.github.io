about:
  heading: "2 great exits. Ready for #3."
  pull_quote: "Turning a great security product into a market-leading brand that delivers sustainable growth and enterprise value."
  body: |
    I am a cybersecurity marketing leader with a track record of building go-to-market functions from early stage through successful exit. Not once, but twice. My work spans category creation, demand generation, analyst relations, ABM, and M&A integration, always in service of one goal:

    Most recently, I served as VP of Marketing at Fortra, leading the $200M+ ARR portfolio of digital risk and email protection solutions. Before that, as VP of Marketing at PhishLabs, I helped scale from under $2M to $26M ARR. Earlier at Secureworks, I was part of the team that grew from $8M to over $100M ARR ahead of the Dell acquisition.
  closing: "I thrive in the GTM build-out phase, delivering the strategies and foundational programs that drive sustainable growth. If you are a cybersecurity company ready to scale, I would love to talk."

