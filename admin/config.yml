backend:
  name: github
  repo: stacyshelley1408/stacyshelley.github.io
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:

  # -----------------------------------------------
  # BLOG POSTS
  # -----------------------------------------------
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["GTM Strategy", "Leadership", "Industry Trends", "Career", "Marketing"]
        default: "GTM Strategy"
      - { label: "Excerpt", name: "excerpt", widget: "string", hint: "Short summary shown on the blog index." }
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Body", name: "body", widget: "markdown" }

  # -----------------------------------------------
  # SITE DATA (Homepage sections)
  # -----------------------------------------------
  - name: "data"
    label: "Site Content"
    files:

      - label: "Homepage"
        name: "homepage"
        file: "_data/homepage.yml"
        fields:

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow text", name: "eyebrow", widget: "string" }
              - { label: "Title / role line", name: "title", widget: "string" }
              - { label: "Statement paragraph", name: "statement", widget: "text" }
              - { label: "Primary button text", name: "cta_primary_text", widget: "string" }
              - { label: "Primary button URL", name: "cta_primary_url", widget: "string" }
              - { label: "Secondary button text", name: "cta_secondary_text", widget: "string" }

          - label: "Stat Cards"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Detail", name: "detail", widget: "string" }

          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body text", name: "body", widget: "markdown" }

          - label: "Experience / Career Sidebar"
            name: "experience"
            widget: "list"
            fields:
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Years", name: "years", widget: "string" }

          - label: "Expertise Items"
            name: "expertise"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "string", hint: "A single character or symbol e.g. ◎" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Contact Section"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "string" }
              - { label: "LinkedIn URL", name: "linkedin_url", widget: "string" }
              - { label: "Email address", name: "email", widget: "string" }

  # -----------------------------------------------
  # PAGES (About / Background, Blog index)
  # -----------------------------------------------
  - name: "pages"
    label: "Pages"
    files:

      - label: "Background (About page)"
        name: "about"
        file: "_pages/about.html"
        fields:
          - { label: "Title", name: "title", widget: "hidden", default: "Background — Stacy Shelley" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/about/" }
          - { label: "Page headline", name: "headline", widget: "string", default: "The person behind the pipeline." }
          - { label: "Page subheading", name: "subheading", widget: "string", default: "Cybersecurity marketer, team builder, two-time exit veteran, and lifelong learner." }
          - { label: "My Story", name: "my_story", widget: "markdown" }
          - { label: "Pull quote", name: "pull_quote", widget: "string" }
          - { label: "Outside of work", name: "outside_work", widget: "markdown" }
          - { label: "Speaking and media", name: "speaking", widget: "markdown" }

      - label: "Writing (Blog index)"
        name: "blog"
        file: "_pages/blog.html"
        fields:
          - { label: "Title", name: "title", widget: "hidden", default: "Writing — Stacy Shelley" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/blog/" }
          - { label: "Page headline", name: "headline", widget: "string", default: "Ideas on cybersecurity, marketing, and building things." }
          - { label: "Page subheading", name: "subheading", widget: "string", default: "GTM strategy, leadership, industry trends, and what two exits taught me about growth." }
