backend:
  name: github
  repo: stacyshelley1408/stacyshelley.github.io
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:

  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["GTM Strategy", "Leadership", "Industry Trends", "Career", "Marketing"], default: "GTM Strategy" }
      - { label: "Excerpt", name: "excerpt", widget: "string", hint: "A short summary shown on the blog index page." }
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:

      - label: "Background (About)"
        name: "about"
        file: "_pages/about.html"
        fields:
          - { label: "Title", name: "title", widget: "hidden", default: "Background — Stacy Shelley" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/about/" }
          - { label: "My Story", name: "my_story", widget: "markdown", hint: "The introductory paragraphs at the top of your background page." }
          - { label: "Pull Quote", name: "pull_quote", widget: "string", hint: "The bold italic quote that appears in the about section." }
          - { label: "Outside of Work", name: "outside_work", widget: "markdown", hint: "The personal interests section at the bottom." }
          - { label: "Speaking and Media", name: "speaking", widget: "markdown", hint: "Speaking engagements and media mentions." }
