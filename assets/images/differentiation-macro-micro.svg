<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" style="width:100%;height:auto;background:#f5f8f7;font-family:'DM Sans',system-ui,sans-serif;">
  <title>Macro vs. Micro Differentiation Across the Buyer's Journey</title>
  <desc>Macro differentiation as a persistent band. Micro rises through the journey and enters the macro band between evaluation and decision, where it has the greatest impact.</desc>

  <!-- Background -->
  <rect width="800" height="460" fill="#f5f8f7"/>

  <!-- Vertical axis line -->
  <line x1="58" y1="50" x2="58" y2="378" stroke="#ccdeda" stroke-width="1"/>
  <polygon points="54,56 58,46 62,56" fill="#ccdeda"/>

  <!-- IMPORTANCE label (rotated, reads bottom-to-top) -->
  <text transform="rotate(-90,20,212)" x="20" y="212" text-anchor="middle" fill="#9ca3af" font-size="9" letter-spacing="4">IMPORTANCE</text>

  <!-- Macro band fill -->
  <rect x="78" y="118" width="644" height="80" fill="#eaf1f0"/>

  <!-- Macro band top border -->
  <line x1="78" y1="118" x2="722" y2="118" stroke="#1a8a80" stroke-width="2"/>

  <!-- Macro band bottom border (subtle dashed) -->
  <line x1="78" y1="198" x2="722" y2="198" stroke="#ccdeda" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Macro eyebrow line + label above the band -->
  <line x1="78" y1="60" x2="102" y2="60" stroke="#1a8a80" stroke-width="1"/>
  <text x="108" y="64" fill="#1a8a80" font-size="10" letter-spacing="3" font-weight="400">MACRO</text>
  <text x="78" y="81" fill="#6b7280" font-size="11" font-weight="300">The strategic differentiation that makes you special.</text>
  <text x="78" y="97" fill="#6b7280" font-size="11" font-weight="300">What you hang your hat on.</text>

  <!-- Micro curve: rises from lower-left into the macro band -->
  <path d="M 98 308 C 258 308, 564 126, 720 120"
        stroke="#0d1117" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Micro start dot -->
  <circle cx="98" cy="308" r="5" fill="#0d1117"/>

  <!-- Micro end dot (inside the macro band) -->
  <circle cx="720" cy="120" r="5" fill="#0d1117"/>

  <!-- Micro eyebrow line + label below the curve start -->
  <line x1="78" y1="332" x2="102" y2="332" stroke="#0d1117" stroke-width="1"/>
  <text x="108" y="336" fill="#0d1117" font-size="10" letter-spacing="3" font-weight="400">MICRO</text>
  <text x="78" y="353" fill="#6b7280" font-size="11" font-weight="300">The specific features that are unique or better than the competition.</text>

  <!-- Horizontal axis -->
  <line x1="58" y1="378" x2="724" y2="378" stroke="#ccdeda" stroke-width="1"/>
  <polygon points="720,374 728,378 720,382" fill="#ccdeda"/>

  <!-- Tick marks -->
  <line x1="98" y1="374" x2="98" y2="382" stroke="#ccdeda" stroke-width="1"/>
  <line x1="410" y1="374" x2="410" y2="382" stroke="#ccdeda" stroke-width="1"/>
  <line x1="720" y1="374" x2="720" y2="382" stroke="#ccdeda" stroke-width="1"/>

  <!-- Stage labels -->
  <text x="98" y="398" text-anchor="middle" fill="#9ca3af" font-size="10" letter-spacing="2">AWARENESS</text>
  <text x="410" y="398" text-anchor="middle" fill="#9ca3af" font-size="10" letter-spacing="2">EVALUATION</text>
  <text x="720" y="398" text-anchor="middle" fill="#9ca3af" font-size="10" letter-spacing="2">DECISION</text>

  <!-- Buyer's Journey axis label -->
  <text x="400" y="438" text-anchor="middle" fill="#ccdeda" font-size="9" letter-spacing="5">BUYER'S JOURNEY</text>
</svg>
