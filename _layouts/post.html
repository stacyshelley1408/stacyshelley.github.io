---
layout: default
---

<div class="post-page">
  <div class="post-page-inner">
    <a href="/blog/" class="post-back">&#8592; All posts</a>
    <h1 class="post-page-title">{{ page.title }}</h1>
    <p class="post-page-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.category %} &middot; {{ page.category }}{% endif %}</p>
    <div class="post-page-body">
      {{ content }}
    </div>
  </div>
</div>
