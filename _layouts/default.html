<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
<title>{{ page.title }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --slate: #1a1f2e;
    --slate-mid: #2d3444;
    --accent: #8b9eb7;
    --accent-light: #c8d4e3;
    --warm-white: #faf9f7;
    --soft-gray: #f3f2ef;
    --text-muted: #6b7280;
    --text-light: #9ca3af;
    --border: #e8e6e1;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--warm-white);
    color: var(--slate);
    line-height: 1.6;
    font-weight: 300;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 4rem;
    background: rgba(250, 249, 247, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--slate);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--slate); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 0 4rem;
    gap: 4rem;
  }

  .hero-text { padding-top: 5rem; }

  .hero-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 2rem;
    height: 1px;
    background: var(--accent);
  }

  .hero-name {
    font-family: var(--serif);
    font-size: clamp(3rem, 5vw, 5rem);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--slate);
    margin-bottom: 1rem;
  }

  .hero-name em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-title {
    font-family: var(--serif);
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    font-weight: 300;
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-style: italic;
  }

  .hero-statement {
    font-size: 1rem;
    line-height: 1.8;
    color: var(--text-muted);
    max-width: 42ch;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }

  .hero-cta {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.75rem;
    background: var(--slate);
    color: var(--warm-white);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: background 0.2s;
  }

  .btn-primary:hover { background: var(--slate-mid); }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.75rem;
    border: 1px solid var(--border);
    color: var(--slate);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-secondary:hover { border-color: var(--slate); }

  .hero-visual {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding-top: 5rem;
  }

  .stat-card {
    background: var(--soft-gray);
    padding: 2rem;
    border-left: 2px solid var(--accent-light);
    transition: border-color 0.3s;
  }

  .stat-card:hover { border-color: var(--accent); }

  .stat-number {
    font-family: var(--serif);
    font-size: 2.8rem;
    font-weight: 300;
    color: var(--slate);
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .stat-label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .stat-detail {
    font-size: 0.85rem;
    color: var(--text-light);
    font-style: italic;
  }

  /* SECTION COMMON */
  section { padding: 7rem 4rem; }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-label::before {
    content: '';
    display: block;
    width: 1.5rem;
    height: 1px;
    background: var(--accent);
  }

  .section-heading {
    font-family: var(--serif);
    font-size: clamp(2rem, 3.5vw, 3rem);
    font-weight: 300;
    line-height: 1.15;
    color: var(--slate);
    margin-bottom: 1.5rem;
  }

  /* ABOUT */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: start;
  }

  .about-body {
    font-size: 1rem;
    line-height: 1.9;
    color: var(--text-muted);
    font-weight: 300;
  }

  .about-body p + p { margin-top: 1.25rem; }

  .about-sidebar { padding-top: 1rem; }

  .sidebar-item {
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-item:first-child { border-top: 1px solid var(--border); }

  .sidebar-co {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }

  .sidebar-role {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--slate);
    margin-bottom: 0.2rem;
  }

  .sidebar-years {
    font-size: 0.8rem;
    color: var(--text-light);
  }

  /* EXPERTISE */
  .expertise-section { background: var(--soft-gray); }

  .expertise-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    margin-top: 3rem;
    background: var(--border);
  }

  .expertise-item {
    background: var(--soft-gray);
    padding: 2.5rem 2rem;
    transition: background 0.2s;
  }

  .expertise-item:hover { background: var(--warm-white); }

  .expertise-icon {
    font-size: 1.5rem;
    margin-bottom: 1rem;
    opacity: 0.7;
  }

  .expertise-name {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--slate);
    margin-bottom: 0.5rem;
  }

  .expertise-desc {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.7;
    font-weight: 300;
  }

  /* CONTACT */
  .contact-section {
    background: var(--slate);
    color: var(--warm-white);
    text-align: center;
  }

  .contact-section .section-label { color: var(--accent-light); }
  .contact-section .section-label::before { background: var(--accent-light); }
  .contact-section .section-heading { color: var(--warm-white); }

  .contact-sub {
    color: var(--accent-light);
    margin-bottom: 3rem;
    font-style: italic;
    font-family: var(--serif);
    font-size: 1.2rem;
  }

  .contact-links {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .contact-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.85rem 2rem;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--warm-white);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: border-color 0.2s, background 0.2s;
  }

  .contact-link:hover {
    border-color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.05);
  }

  /* FOOTER */
  footer {
    padding: 2rem 4rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer p {
    font-size: 0.8rem;
    color: var(--text-light);
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-text > * { animation: fadeUp 0.7s ease forwards; opacity: 0; }

  .hero-eyebrow { animation-delay: 0.1s; }
  .hero-name    { animation-delay: 0.2s; }
  .hero-title   { animation-delay: 0.3s; }
  .hero-statement { animation-delay: 0.4s; }
  .hero-cta     { animation-delay: 0.5s; }

  .hero-visual .stat-card:nth-child(1) { animation: fadeUp 0.7s 0.30s ease forwards; opacity: 0; }
  .hero-visual .stat-card:nth-child(2) { animation: fadeUp 0.7s 0.45s ease forwards; opacity: 0; }
  .hero-visual .stat-card:nth-child(3) { animation: fadeUp 0.7s 0.60s ease forwards; opacity: 0; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    nav { padding: 1.25rem 2rem; }
    .nav-links { gap: 1.5rem; }
    .hero { grid-template-columns: 1fr; padding: 6rem 2rem 4rem; gap: 3rem; }
    .hero-visual { padding-top: 0; }
    section { padding: 5rem 2rem; }
    .about-grid { grid-template-columns: 1fr; gap: 3rem; }
    .expertise-grid { grid-template-columns: 1fr 1fr; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; }
  }

  @media (max-width: 600px) {
    .nav-links { display: none; }
    .expertise-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">Stacy Shelley</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#expertise">Expertise</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

{{ content }}

<footer>
  <p>&copy; {{ site.time | date: '%Y' }} Stacy Shelley. All rights reserved.</p>
  <p>Cybersecurity Marketing Executive</p>
</footer>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>

</body>
</html>
