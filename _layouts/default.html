<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
<title>{{ page.title }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --slate: #0d1117;
    --slate-mid: #1c2b35;
    --accent: #1a8a80;
    --accent-light: #5ab8b0;
    --warm: #00695c;
    --warm-white: #f5f8f7;
    --soft-gray: #eaf1f0;
    --text-muted: #6b7280;
    --text-light: #9ca3af;
    --border: #ccdeda;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body { font-family: var(--sans); background: var(--warm-white); color: var(--slate); line-height: 1.6; font-weight: 300; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.25rem 4rem;
    background: rgba(250, 249, 247, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo { font-family: var(--serif); font-size: 1.1rem; font-weight: 400; letter-spacing: 0.02em; color: var(--slate); text-decoration: none; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--slate); }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 4rem;
    overflow: hidden;
  }
  .hero-text {
    position: relative;
    z-index: 2;
    max-width: 52%;
    padding-top: 5rem;
    padding-bottom: 5rem;
  }

  .hero-eyebrow { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
  .hero-eyebrow::before { content: ''; display: block; width: 2rem; height: 1px; background: var(--accent); }

  .hero-name { font-family: var(--serif); font-size: clamp(3rem, 5vw, 5rem); font-weight: 300; line-height: 1.05; letter-spacing: -0.01em; color: var(--slate); margin-bottom: 0.75rem; }
  .hero-name em { font-style: italic; color: var(--accent); }

  /* ROTATING DESCRIPTOR */
  .hero-descriptor { font-family: var(--serif); font-size: clamp(1rem, 1.8vw, 1.4rem); font-weight: 300; color: var(--text-muted); margin-bottom: 2rem; display: flex; align-items: baseline; gap: 0.4em; min-height: 1.8rem; }
  .descriptor-prefix { font-style: normal; }
  .descriptor-word { color: var(--warm); font-style: italic; display: inline-block; transition: opacity 0.3s ease, transform 0.3s ease; }
  .descriptor-word.exit { opacity: 0; transform: translateY(-6px); }
  .descriptor-word.enter { opacity: 0; transform: translateY(6px); }

  .hero-statement { font-size: 1rem; line-height: 1.85; color: var(--text-muted); max-width: 44ch; margin-bottom: 1rem; font-weight: 300; }
  .warm-line { display: inline; border-bottom: 1px solid var(--warm); padding-bottom: 1px; }
  .hero-aside { font-size: 0.8rem; color: var(--text-light); font-style: italic; margin-bottom: 2.5rem; max-width: 40ch; line-height: 1.6; }

  .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }

  .btn-primary { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; background: var(--slate); color: var(--warm-white); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; transition: background 0.2s; }
  .btn-primary:hover { background: var(--slate-mid); }
  .btn-secondary { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; border: 1px solid var(--border); color: var(--slate); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; transition: border-color 0.2s; }
  .btn-secondary:hover { border-color: var(--slate); }

  /* HERO PHOTO — bottom-anchored portrait */
  /* Photo is absolutely positioned at the bottom-right of the hero.
     It rises from the bottom edge and fades out at the top,
     so it feels grounded in the space rather than boxed. */
  .hero-photo {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 42%;
    height: 92%;
    z-index: 1;
  }

  .hero-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    /* Fades in from transparent at the top, fully solid by ~30%.
       Left edge softens into the background. */
    -webkit-mask-image:
      linear-gradient(to right,  transparent 0%, black 18%, black 100%),
      linear-gradient(to bottom, transparent 0%, black 28%, black 100%);
    -webkit-mask-composite: source-in;
            mask-image:
      linear-gradient(to right,  transparent 0%, black 18%, black 100%),
      linear-gradient(to bottom, transparent 0%, black 28%, black 100%);
            mask-composite: intersect;
  }

  /* On mobile, stack photo below text as a portrait crop */
  @media (max-width: 900px) {
    .hero {
      flex-direction: column;
      align-items: flex-start;
      padding: 6rem 2rem 0;
      gap: 0;
    }
    .hero-text {
      max-width: 100%;
      padding-bottom: 2rem;
    }
    .hero-photo {
      position: relative;
      bottom: auto;
      right: auto;
      width: 100%;
      height: 70vw;
      max-height: 380px;
    }
    .hero-photo img {
      object-position: center 20%;
      -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
              mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      -webkit-mask-composite: unset;
              mask-composite: unset;
    }
  }

/* STATS STRIP */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--slate);
}

.stats-strip .stat-card {
  padding: 3.5rem 3rem;
  border-right: 1px solid rgba(255,255,255,0.07);
  position: relative;
  overflow: hidden;
  transition: background 0.3s;
}

.stats-strip .stat-card:last-child {
  border-right: none;
}

.stats-strip .stat-card:hover {
  background: var(--slate-mid);
}

/* Subtle warm accent line at top on hover */
.stats-strip .stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--warm);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.35s ease;
}

.stats-strip .stat-card:hover::before {
  transform: scaleX(1);
}

.stat-label {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1rem;
}

.stat-number {
  font-family: var(--serif);
  font-size: clamp(3rem, 5vw, 4.5rem);
  font-weight: 300;
  line-height: 1;
  color: var(--warm-white);
  margin-bottom: 0.85rem;
  letter-spacing: -0.02em;
}

.stat-detail {
  font-size: 0.82rem;
  color: var(--accent-light);
  line-height: 1.5;
  font-weight: 300;
  max-width: 22ch;
}

@media (max-width: 900px) {
  .stats-strip {
    grid-template-columns: 1fr;
  }

  .stats-strip .stat-card {
    padding: 2.5rem 2rem;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .stats-strip .stat-card:last-child {
    border-bottom: none;
  }
}

  /* SECTION COMMON */
  section { padding: 7rem 4rem; }
  .section-label { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
  .section-label::before { content: ''; display: block; width: 1.5rem; height: 1px; background: var(--accent); }
  .section-heading { font-family: var(--serif); font-size: clamp(2rem, 3.5vw, 3rem); font-weight: 300; line-height: 1.15; color: var(--slate); margin-bottom: 1.5rem; }

  /* ABOUT */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: start; }
  .about-body { font-size: 1rem; line-height: 1.9; color: var(--text-muted); font-weight: 300; }
  .about-body p + p { margin-top: 1.25rem; }
  .about-wink { color: var(--warm); font-style: italic; }
  .about-pull-quote {
    border-left: 2px solid var(--warm);
    margin: 2rem 0;
    padding: 0.75rem 1.75rem;
    font-family: var(--serif);
    font-size: clamp(1.15rem, 2vw, 1.4rem);
    font-style: italic;
    font-weight: 300;
    color: var(--slate);
    line-height: 1.6;
  }
  .about-sidebar { padding-top: 1rem; }
  .sidebar-item { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }
  .sidebar-item:first-child { border-top: 1px solid var(--border); }
  .sidebar-co { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.25rem; }
  .sidebar-role { font-family: var(--serif); font-size: 1.1rem; font-weight: 400; color: var(--slate); margin-bottom: 0.2rem; }
  .sidebar-years { font-size: 0.8rem; color: var(--text-light); }
  .sidebar-closing p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.75; font-weight: 300; font-style: italic; }

  /* EXPERTISE */
  .expertise-section { background: var(--soft-gray); }
  .expertise-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; margin-top: 3rem; background: var(--border); }
  .expertise-item { background: var(--soft-gray); padding: 2.5rem 2rem; transition: background 0.2s; }
  .expertise-item:hover { background: var(--warm-white); }
  .expertise-icon { margin-bottom: 1.25rem; }
  .expertise-icon svg { width: 1.75rem; height: 1.75rem; stroke: var(--warm); stroke-width: 1.5; fill: none; display: block; }
  .expertise-name { font-family: var(--serif); font-size: 1.2rem; font-weight: 400; color: var(--slate); margin-bottom: 0.5rem; }
  .expertise-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; font-weight: 300; }

  /* CONTACT */
  .contact-section { background: var(--slate); color: var(--warm-white); text-align: center; }
  .contact-section .section-label { color: var(--accent-light); }
  .contact-section .section-label::before { background: var(--accent-light); }
  .contact-section .section-heading { color: var(--warm-white); }
  .contact-sub { color: var(--accent-light); margin-bottom: 0.75rem; font-style: italic; font-family: var(--serif); font-size: 1.2rem; }
  .contact-wink { font-size: 0.8rem; color: rgba(255,255,255,0.3); font-style: italic; margin-bottom: 2.5rem; }
  .contact-links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .contact-link { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.85rem 2rem; border: 1px solid rgba(255,255,255,0.2); color: var(--warm-white); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; transition: border-color 0.2s, background 0.2s; }
  .contact-link:hover { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.05); }

  /* FOOTER */
  footer { padding: 2rem 4rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  footer p { font-size: 0.8rem; color: var(--text-light); }

  /* SCROLL REVEAL */
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .hero-text > * { animation: fadeUp 0.7s ease forwards; opacity: 0; }
  .hero-eyebrow    { animation-delay: 0.10s; }
  .hero-name       { animation-delay: 0.20s; }
  .hero-descriptor { animation-delay: 0.30s; }
  .hero-statement  { animation-delay: 0.40s; }
  .hero-aside      { animation-delay: 0.45s; }
  .hero-cta        { animation-delay: 0.50s; }
  .hero-visual .stat-card:nth-child(1) { animation: fadeUp 0.7s 0.30s ease forwards; opacity: 0; }
  .hero-visual .stat-card:nth-child(2) { animation: fadeUp 0.7s 0.45s ease forwards; opacity: 0; }
  .hero-visual .stat-card:nth-child(3) { animation: fadeUp 0.7s 0.60s ease forwards; opacity: 0; }
  .latest-teaser { animation-delay: 0.60s; }

  /* LATEST WRITING TEASER */
  .latest-teaser {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    width: 100%;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .teaser-label {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
    padding-top: 0.15rem;
    flex-shrink: 0;
  }
  .teaser-slot {
    position: relative;
    min-height: 3.4rem;
    flex: 1;
    overflow: hidden;
  }
  .teaser-item {
    position: absolute;
    top: 0; left: 0; right: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .teaser-item.active { opacity: 1; transform: translateY(0); }
  .teaser-item.above  { opacity: 0; transform: translateY(-8px); }
  .teaser-item.below  { opacity: 0; transform: translateY(8px); }
  .teaser-cat {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 0.2rem;
  }
  .teaser-title {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 400;
    color: var(--slate);
    font-style: italic;
    line-height: 1.3;
    text-decoration: none;
    display: block;
    transition: color 0.2s;
  }
  .teaser-title:hover { color: var(--accent); }
  .teaser-progress {
    display: flex;
    gap: 0.3rem;
    margin-top: 0.6rem;
  }
  .t-dot {
    width: 16px; height: 2px;
    background: var(--border);
    transition: background 0.3s, width 0.3s;
    cursor: pointer;
  }
  .t-dot.on { background: var(--accent); width: 24px; }

  /* PAGE HEADER (About & Blog pages) */
  .page-header { padding: 10rem 4rem 4rem; border-bottom: 1px solid var(--border); max-width: 860px; }
  .page-header h1 { font-family: var(--serif); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; line-height: 1.1; color: var(--slate); margin-bottom: 1rem; }
  .page-header p { font-size: 1.1rem; color: var(--text-muted); font-style: italic; font-family: var(--serif); max-width: 56ch; }

  /* ABOUT PAGE */
  .about-page { padding: 5rem 4rem; }
  .about-page-grid { display: grid; grid-template-columns: 260px 1fr; gap: 5rem; align-items: start; margin-bottom: 5rem; }
  .about-photo-block { position: sticky; top: 6rem; }
  .about-photo-placeholder { width: 100%; aspect-ratio: 3/4; background: var(--soft-gray); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; border: 1px dashed var(--border); }
  .about-photo-placeholder span { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); text-align: center; padding: 1rem; line-height: 1.8; }
  .about-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; margin-bottom: 1.5rem; }
  .about-social a { display: block; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); text-decoration: none; margin-bottom: 0.6rem; transition: color 0.2s; }
  .about-social a:hover { color: var(--slate); }
  .about-content h2 { font-family: var(--serif); font-size: 1.8rem; font-weight: 300; color: var(--slate); margin: 3rem 0 1rem; padding-top: 3rem; border-top: 1px solid var(--border); }
  .about-content h2:first-child { margin-top: 0; padding-top: 0; border-top: none; }
  .about-content p { font-size: 1rem; line-height: 1.9; color: var(--text-muted); font-weight: 300; margin-bottom: 1.25rem; }
  .about-content .pull-quote { background: var(--soft-gray); border-left: 2px solid var(--warm); padding: 1.5rem 2rem; margin: 2rem 0; font-family: var(--serif); font-size: 1.25rem; font-style: italic; color: var(--slate); line-height: 1.6; }
  .about-content ul { list-style: none; margin-bottom: 1.25rem; }
  .about-content ul li { font-size: 0.95rem; color: var(--text-muted); padding: 0.6rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
  .about-content ul li span { font-size: 0.8rem; color: var(--text-light); white-space: nowrap; }

  /* BLOG INDEX */
  .blog-page { padding: 4rem; }
  .post-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2px; background: var(--border); margin-top: 3rem; }
  .post-card { background: var(--warm-white); padding: 2.5rem; text-decoration: none; display: block; transition: background 0.2s; }
  .post-card:hover { background: var(--soft-gray); }
  .post-tag { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--warm); margin-bottom: 0.75rem; }
  .post-title { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; color: var(--slate); line-height: 1.3; margin-bottom: 0.75rem; }
  .post-excerpt { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 1.5rem; font-weight: 300; }
  .post-meta { font-size: 0.75rem; color: var(--text-light); }
  .blog-empty { padding: 5rem 2.5rem; background: var(--warm-white); text-align: center; }
  .blog-empty p { font-family: var(--serif); font-size: 1.2rem; font-style: italic; color: var(--text-muted); }

  /* BLOG POST PAGE */
  .post-page { padding: 5rem 4rem; }
  .post-page-inner { max-width: 680px; margin: 0 auto; }
  .post-back { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; margin-bottom: 3rem; transition: color 0.2s; }
  .post-back:hover { color: var(--slate); }
  .post-page-title { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; line-height: 1.15; color: var(--slate); margin-bottom: 0.75rem; }
  .post-page-meta { font-size: 0.8rem; color: var(--text-light); margin-bottom: 3rem; }
  .post-page-body p { font-size: 1.05rem; line-height: 1.9; color: var(--text-muted); margin-bottom: 1.5rem; font-weight: 300; }
  .post-page-body h2 { font-family: var(--serif); font-size: 1.6rem; font-weight: 300; color: var(--slate); margin: 2.5rem 0 1rem; }
  .post-page-body h3 { font-family: var(--serif); font-size: 1.2rem; font-weight: 400; color: var(--slate); margin: 2rem 0 0.75rem; }
  .post-page-body blockquote { border-left: 2px solid var(--warm); padding: 1rem 1.5rem; margin: 2rem 0; font-family: var(--serif); font-size: 1.2rem; font-style: italic; color: var(--slate); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    nav { padding: 1.25rem 2rem; }
    .nav-links { gap: 1.2rem; }
    .hero { grid-template-columns: 1fr; padding: 6rem 2rem 4rem; gap: 3rem; }
    .hero-visual { padding-top: 0; }
    section { padding: 5rem 2rem; }
    .about-grid { grid-template-columns: 1fr; gap: 3rem; }
    .expertise-grid { grid-template-columns: 1fr 1fr; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    .page-header { padding: 8rem 2rem 3rem; }
    .about-page { padding: 3rem 2rem; }
    .about-page-grid { grid-template-columns: 1fr; gap: 2rem; }
    .about-photo-block { position: static; }
    .about-photo, .about-photo-placeholder { aspect-ratio: 4/3; max-height: 320px; }
    .blog-page { padding: 3rem 2rem; }
    .post-page { padding: 3rem 2rem; }
  }

  @media (max-width: 600px) {
    .nav-links { gap: 0.75rem; }
    .expertise-grid { grid-template-columns: 1fr; }
    .post-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Stacy Shelley</a>
  <ul class="nav-links">
    <li><a href="/#about">About</a></li>
    <li><a href="/#expertise">Expertise</a></li>
    <li><a href="/about/">Background</a></li>
    <li><a href="/blog/">Writing</a></li>
    <li><a href="/#contact">Contact</a></li>
  </ul>
</nav>

{{ content }}

<footer>
  <p>&copy; {{ site.time | date: '%Y' }} Stacy Shelley. All rights reserved.</p>
  <p>Cybersecurity Marketing Leader</p>
</footer>

</body>
</html>
